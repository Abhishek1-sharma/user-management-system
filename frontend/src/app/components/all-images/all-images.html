<app-navbar></app-navbar>
<div style="padding:20px;max-width:1000px;margin:auto">
  <h2>All Captured Images</h2>

  <div *ngIf="images.length === 0">
    <p>No images captured yet.</p>
  </div>

  <div style="display:flex;flex-wrap:wrap;gap:16px">
    <div *ngFor="let img of images"
      style="border:1px solid #ddd;border-radius:8px;padding:8px;width:180px">
      <img [src]="baseUrl + img.path + '?token=' + token"
  style="width:100%;height:150px;object-fit:cover;border-radius:4px" />
      <p style="margin:6px 0 2px;font-weight:bold;font-size:13px">
        👤 {{ img.userId?.username }}
      </p>
      <p style="margin:0;font-size:11px;color:gray">
        {{ img.userId?.role }} · {{ img.capturedAt | date:'short' }}
      </p>
    </div>
  </div>
</div>
